# ============================================
# 考研伴学 Agent - Docker Compose 编排
# ============================================
# 用法:
#   启动:  docker compose up -d
#   停止:  docker compose down
#   日志:  docker compose logs -f
#   重建:  docker compose up -d --build
# ============================================

version: "3.9"

services:
  exam-agent:
    # ---- 镜像构建 ----
    build:
      context: .
      dockerfile: Dockerfile
    
    # 容器名称
    container_name: exam_agent
    
    # ---- 端口映射 ----
    ports:
      - "8000:8000"
    
    # ---- 环境变量 ----
    # 方式一: 直接注入关键变量
    environment:
      # HuggingFace 国内镜像（必须，否则模型下载失败）
      - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
      # 以下变量从 .env 文件读取（见 env_file）
    
    # 方式二: 从 .env 文件批量加载
    # [注意] .env 文件不会被提交到 Git，确保 API Key 安全
    env_file:
      - .env
    
    # ---- 数据卷挂载 ----
    volumes:
      # ① ChromaDB 向量库持久化（容器删除后数据不丢）
      - ./data:/app/data
      
      # ② HuggingFace 模型缓存（避免每次重建容器重新下载 100MB 模型）
      - hf_models:/app/.cache/huggingface
      
      # [缺陷] .env 变化后需要 docker compose restart 才会生效，
      #   不是热加载。后续可考虑用 Docker secrets 或配置中心。
    
    # ---- 重启策略 ----
    restart: unless-stopped
    # unless-stopped: 除非手动 docker compose down，否则崩溃后自动重启
    
    # ---- 健康检查 ----
    # Docker 通过此接口判断容器是否正常运行
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s      # 每 30 秒检查一次
      timeout: 10s       # 超时时间
      retries: 3         # 连续失败 3 次标记为 unhealthy
      start_period: 60s  # 启动后 60 秒内不检查（等模型加载）

# ---- 命名卷 ----
volumes:
  hf_models:
    # HuggingFace 模型缓存卷 —— 独立于容器生命周期
    # 模型文件约 100MB，首次下载后除非手动删除否则一直保留
    # [后续扩展] 如需更换嵌入模型，删除此卷后重建:
    #   docker compose down -v && docker compose up -d
